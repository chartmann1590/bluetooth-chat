name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.jks"

      - name: Run unit tests
        run: ./gradlew test --console=plain

      - name: Build release APK and App Bundle
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # github.run_number only ever increases, so every release build automatically gets a
          # strictly higher versionCode with no manual bump needed.
          APP_VERSION_CODE: ${{ github.run_number }}
          APP_VERSION_NAME: "1.0.${{ github.run_number }}"
          # GitHub feedback reporter config (passed to Gradle as project properties)
          ORG_GRADLE_PROJECT_github_api_token: ${{ secrets.GH_API_TOKEN }}
          ORG_GRADLE_PROJECT_github_repo_owner: ${{ secrets.GH_REPO_OWNER }}
          ORG_GRADLE_PROJECT_github_repo_name: ${{ secrets.GH_REPO_NAME }}
        run: ./gradlew assembleRelease bundleRelease --console=plain

      - name: Remove decoded keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release.jks"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }} (${{ github.sha }})
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
