name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.jks"

      - name: Run unit tests
        run: ./gradlew test --console=plain

      - name: Build release APKs and App Bundles (both flavors)
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # github.run_number only ever increases, so every release build automatically gets a
          # strictly higher versionCode with no manual bump needed.
          APP_VERSION_CODE: ${{ github.run_number }}
          APP_VERSION_NAME: "1.0.${{ github.run_number }}"
          # GitHub feedback reporter config (passed to Gradle as project properties)
          ORG_GRADLE_PROJECT_github_api_token: ${{ secrets.GH_API_TOKEN }}
          ORG_GRADLE_PROJECT_github_repo_owner: ${{ secrets.GH_REPO_OWNER }}
          ORG_GRADLE_PROJECT_github_repo_name: ${{ secrets.GH_REPO_NAME }}
          # Github/Stripe flavor billing config — the Worker base URL and the entitlement-token
          # *public* verification key only (never a Stripe secret key or the Worker's signing
          # private key; those live solely in the Worker's own deployment secrets, set via
          # `wrangler secret put` / the Cloudflare API, not here).
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_BASE_URL }}
          ENTITLEMENT_VERIFY_PUBLIC_KEY_HEX: ${{ secrets.ENTITLEMENT_VERIFY_PUBLIC_KEY_HEX }}
          # AdMob app id + ad unit ids (all public identifiers, not secrets in the security sense,
          # but kept out of source so release builds are the only ones ever serving real ads).
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
        run: ./gradlew assemblePlayRelease bundlePlayRelease assembleGithubRelease bundleGithubRelease --console=plain

      - name: Remove decoded keystore
        if: always()
        run: |
          rm -f "${{ runner.temp }}/release.jks"
          rm -f app/google-services.json

      - name: List github-flavor release APK and play-flavor bundle output (debugging aid if the
          release asset globs below ever stop matching again)
        run: |
          ls -la app/build/outputs/apk/github/release/
          ls -la app/build/outputs/bundle/playRelease/

      # AGP's own output filenames (app-play-release.aab, app-github-release*.apk) carry no
      # version info, so a downloaded file gives no clue which build it came from without
      # cross-referencing the release page. Copy (not rename in place) so the glob-based "list"
      # step above still finds the originals if AGP's naming ever shifts again.
      - name: Rename release artifacts with app name and version code
        id: rename
        run: |
          AAB_SRC=$(ls app/build/outputs/bundle/playRelease/app-play-release*.aab | head -1)
          APK_SRC=$(ls app/build/outputs/apk/github/release/app-github-release*.apk | head -1)
          AAB_OUT="app/build/outputs/bundle/playRelease/MeshTalk-play-v${{ github.run_number }}.aab"
          APK_OUT="app/build/outputs/apk/github/release/MeshTalk-github-v${{ github.run_number }}.apk"
          cp "$AAB_SRC" "$AAB_OUT"
          cp "$APK_SRC" "$APK_OUT"
          echo "aab_path=$AAB_OUT" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_OUT" >> "$GITHUB_OUTPUT"

      # Also kept as a workflow artifact (in addition to the release asset below) since artifacts
      # are easier to fetch from within an in-progress workflow run than release assets are.
      - name: Upload play-flavor App Bundle as a build artifact
        uses: actions/upload-artifact@v7
        with:
          name: MeshTalk-play-v${{ github.run_number }}-aab
          path: ${{ steps.rename.outputs.aab_path }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }} (${{ github.sha }})
          generate_release_notes: true
          files: |
            ${{ steps.rename.outputs.apk_path }}
            ${{ steps.rename.outputs.aab_path }}
