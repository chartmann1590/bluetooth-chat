name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew

      # The play flavor's Firebase/Crashlytics setup needs a google-services.json present to apply
      # the google-services plugin (see build.gradle.kts: the plugin only applies
      # `if (file("google-services.json").exists())`). CI only needs to compile, not talk to real
      # Firebase, so a structurally-valid dummy is used instead of the real secret — this also
      # means PRs from Dependabot (whose runs GitHub deliberately denies repo secrets to) and any
      # future external-contributor PRs build correctly without needing secrets at all.
      - name: Write dummy google-services.json
        run: |
          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "0",
              "project_id": "ci-dummy-project",
              "storage_bucket": "ci-dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.charles.meshtalk.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "ci-dummy-key" }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Run unit tests
        run: ./gradlew test --console=plain

      # Built as two separate invocations, not one `assemblePlayDebug assembleGithubDebug` command:
      # combined, the play flavor's Crashlytics/Firebase Perf ASM bytecode transform intermittently
      # fails to resolve classes (e.g. "com.google.common.util.concurrent.ListenableFuture") during
      # packagePlayDebug — a known flakiness pattern when Gradle's parallel task execution shares
      # transform caches across multiple variants in one task graph. Separate invocations force each
      # variant's task graph to fully resolve before the next starts, which avoids the race.
      - name: Build play-flavor debug APK (unsigned)
        run: ./gradlew assemblePlayDebug --console=plain

      - name: Build github-flavor debug APK (unsigned)
        run: ./gradlew assembleGithubDebug --console=plain

      - name: Remove decoded google-services.json
        if: always()
        run: rm -f app/google-services.json
